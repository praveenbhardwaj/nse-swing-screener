/* ─── Animated background ─── */
function AnimatedBackground() {
  const canvasRef = useRef(null);
  const mouse = useRef({ x: -9999, y: -9999 });
  const animRef = useRef(null);

  useEffect(() => {
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H, nodes = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function rand(a, b) { return a + Math.random() * (b - a); }

    function makeNodes(n) {
      nodes = [];
      for (let i = 0; i < n; i++) {
        nodes.push({
          x: rand(0, W), y: rand(0, H),
          vx: rand(-0.18, 0.18), vy: rand(-0.12, 0.12),
          r: rand(1.5, 3.5),
          phase: rand(0, Math.PI * 2)
        });
      }
    }
    makeNodes(70);

    window.addEventListener('mousemove', e => {
      mouse.current = { x: e.clientX, y: e.clientY };
    });

    let t = 0;
    function draw() {
      t += 0.008;
      ctx.clearRect(0, 0, W, H);

      // Soft gradient overlay
      const grd = ctx.createRadialGradient(W*0.3, H*0.2, 0, W*0.3, H*0.2, W*0.7);
      grd.addColorStop(0, 'rgba(200,210,255,0.12)');
      grd.addColorStop(1, 'rgba(255,248,240,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);

      const grd2 = ctx.createRadialGradient(W*0.8, H*0.8, 0, W*0.8, H*0.8, W*0.5);
      grd2.addColorStop(0, 'rgba(255,220,180,0.08)');
      grd2.addColorStop(1, 'rgba(255,248,240,0)');
      ctx.fillStyle = grd2;
      ctx.fillRect(0, 0, W, H);

      // Update + draw nodes
      nodes.forEach(n => {
        // mouse repel
        const dx = n.x - mouse.current.x;
        const dy = n.y - mouse.current.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 120) {
          const f = (120 - d) / 120 * 0.3;
          n.vx += (dx/d) * f;
          n.vy += (dy/d) * f;
        }
        // dampen
        n.vx *= 0.99;
        n.vy *= 0.99;
        n.x += n.vx;
        n.y += n.vy;
        // wrap
        if (n.x < -20) n.x = W + 20;
        if (n.x > W + 20) n.x = -20;
        if (n.y < -20) n.y = H + 20;
        if (n.y > H + 20) n.y = -20;

        const pulse = Math.sin(t + n.phase) * 0.3 + 0.7;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * pulse, 0, Math.PI*2);
        ctx.fillStyle = `rgba(100,110,180,${0.12 * pulse})`;
        ctx.fill();
      });

      // Draw edges
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i+1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < 130) {
            const alpha = (1 - d/130) * 0.12;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(90,100,180,${alpha})`;
            ctx.lineWidth = 0.7;
            ctx.stroke();
          }
        }
      }

      // Subtle grid
      ctx.strokeStyle = 'rgba(100,110,160,0.035)';
      ctx.lineWidth = 1;
      const gridSize = 60;
      for (let x = 0; x < W; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      animRef.current = requestAnimationFrame(draw);
    }
    draw();

    return () => {
      cancelAnimationFrame(animRef.current);
      window.removeEventListener('resize', resize);
    };
  }, []);

  return null;
}

/* ─── Components ─── */
function ScoreRing({ score }) {
  const pct = score / 100;
  const strong = score >= 80;
  const color = strong ? 'var(--navy)' : 'var(--navy-soft)';
  const circumference = 2 * Math.PI * 15;
  const dash = pct * circumference;

  return (
    <div style={{ width: 36, height: 36, position: 'relative', flexShrink: 0 }}>
      <svg width="36" height="36" style={{ transform: 'rotate(-90deg)' }}>
        <circle cx="18" cy="18" r="15" fill="none" stroke="oklch(0.92 0.03 265)" strokeWidth="2.5" />
        <circle cx="18" cy="18" r="15" fill="none" stroke={color} strokeWidth="2.5"
          strokeDasharray={`${dash} ${circumference}`} strokeLinecap="round" />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'DM Mono'", fontSize: 10, fontWeight: 500, color }}>
        {score}
      </div>
    </div>
  );
}

function SignalBadge({ signal }) {
  const strong = signal === 'STRONG BUY';
  return (
    <span className="pill" style={{
      background: strong ? 'var(--navy)' : 'var(--green-bg)',
      color: strong ? 'white' : 'var(--green)',
      border: strong ? 'none' : '1px solid var(--green-border)',
      fontSize: 10,
    }}>
      {signal}
    </span>
  );
}

function StatusBadge({ status }) {
  const cfg = {
    'Open': { bg: 'oklch(0.96 0.04 265)', color: 'var(--navy-mid)', border: 'oklch(0.88 0.06 265)' },
    'Target Hit': { bg: 'var(--green-bg)', color: 'var(--green)', border: 'var(--green-border)' },
    'SL Hit': { bg: 'var(--red-bg)', color: 'var(--red)', border: 'var(--red-border)' },

  const s = cfg[status] || cfg['Open'];
  return (
    <span className="pill" style={{ background: s.bg, color: s.color, border: `1px solid ${s.border}`, fontSize: 10 }}>

  );
}

function TradeCard({ t }) {
  const pos = t.pnl >= 0;
  const [expanded, setExpanded] = useState(false);

  // Progress: how far price has moved from entry toward target
  const progress = Math.max(0, Math.min(100,
    pos
      ? ((t.pnl) / (t.target - t.entry)) * 100
      : ((t.entry - t.sl) > 0 ? (Math.abs(t.pnl) / (t.entry - t.sl)) * 100 : 0)
  ));

  const accentColor = pos ? 'var(--green)' : 'var(--red)';
  const accentBg = pos ? 'var(--green-bg)' : 'var(--red-bg)';
  const accentBorder = pos ? 'var(--green-border)' : 'var(--red-border)';
  const accentLight = pos ? 'oklch(0.94 0.06 145 / 0.35)' : 'oklch(0.94 0.06 22 / 0.3)';

  return (
    <div style={{
      background: 'white',
      border: `1px solid ${accentBorder}`,
      borderRadius: 'var(--radius)',
      overflow: 'hidden',
      boxShadow: `var(--shadow-sm), 0 0 0 0px ${accentColor}`,
      transition: 'all 0.2s',
      cursor: 'default',
    }}
    onMouseEnter={e => { e.currentTarget.style.boxShadow = `var(--shadow-md), 0 0 0 1.5px ${accentColor}20`; e.currentTarget.style.transform = 'translateY(-2px)'; }}
    onMouseLeave={e => { e.currentTarget.style.boxShadow = 'var(--shadow-sm)'; e.currentTarget.style.transform = 'translateY(0)'; }}
    >
      {/* Color bar top */}
      <div style={{ height: 3, background: `linear-gradient(to right, ${accentColor}, ${accentColor}66)` }}></div>

      <div style={{ padding: '18px 20px' }}>
        {/* Header row */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <ScoreRing score={t.score} />
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--navy)', fontFamily: 'Space Grotesk', letterSpacing: '-0.01em' }}>{t.symbol}</div>
              <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 1 }}>{t.name}</div>
            </div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
            <SignalBadge signal={t.signal} />
            <div style={{ fontSize: 10, color: 'var(--text-tertiary)', fontFamily: "'DM Mono'" }}>{t.date}</div>
          </div>
        </div>

        {/* P&L hero */}
        <div style={{
          background: accentLight,
          border: `1px solid ${accentBorder}`,
          borderRadius: 10,
          padding: '12px 16px',
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          marginBottom: 14,
        }}>
          <div>
            <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: accentColor, opacity: 0.7, marginBottom: 4 }}>Live P&amp;L</div>
            <div style={{ fontFamily: "'DM Mono'", fontSize: 22, fontWeight: 600, color: accentColor, letterSpacing: '-0.02em' }}>
              {pos ? '+' : ''}{t.pnl.toFixed(2)}
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: accentColor, opacity: 0.7, marginBottom: 4 }}>Return</div>
            <div style={{ fontFamily: "'DM Mono'", fontSize: 22, fontWeight: 600, color: accentColor }}>

        {/* Price row */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 14 }}>

          ].map(item => (
            <div key={item.label} style={{ background: 'oklch(0.975 0.005 265)', borderRadius: 8, padding: '10px 12px' }}>
              <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-tertiary)', marginBottom: 5 }}>{item.label}</div>
              <div style={{ fontFamily: "'DM Mono'", fontSize: 13, fontWeight: 500, color: item.color }}>{item.value}</div>

        </div>

        {/* Buy range */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)' }}>

            border: 'none', background: 'none', cursor: 'pointer',
            fontSize: 11, color: 'var(--navy-soft)', fontFamily: 'Space Grotesk',
            fontWeight: 500, display: 'flex', alignItems: 'center', gap: 4,
            padding: '2px 0',
          }}>

            <span style={{ fontSize: 9, transform: expanded ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s', display: 'inline-block' }}>▼</span>
          </button>
        </div>

        {/* Expandable reason */}
        {expanded && (
          <div style={{
            marginTop: 12, padding: '12px 14px',
            background: 'oklch(0.975 0.005 265)',
            borderRadius: 8,
            fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.65,
            fontFamily: 'Space Grotesk',
            animation: 'fadeUp 0.2s ease',
          }}>
            {t.reason}
          </div>
        )}
      </div>
    </div>
  );
}

                  <td style={{ color: 'var(--red)' }}>{t.sl.toLocaleString('en-IN')}</td>
                  <td><StatusBadge status={t.status} /></td>
                  <td><PnLCell pnl={t.pnl} pnlPct={t.pnlPct} /></td>
                  <td style={{ color: 'var(--text-secondary)' }}>{t.days}d</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

const CAT_ICONS = { 'Entry': '▲', 'Risk': '⬡', 'Exit': '●', 'Mindset': '◆' };
const CAT_COLORS = {
  'Entry': { bg: 'oklch(0.96 0.04 265)', color: 'var(--navy)', border: 'oklch(0.88 0.06 265)' },
  'Risk': { bg: 'var(--red-bg)', color: 'var(--red)', border: 'var(--red-border)' },

  'Mindset': { bg: 'var(--gold-bg)', color: 'var(--gold)', border: 'oklch(0.87 0.08 75)' },
};

function TradingRulesPage() {
  const [active, setActive] = useState('All');
  const categories = ['All', 'Entry', 'Risk', 'Exit', 'Mindset'];

          <div style={{ fontSize: 14, opacity: 0.7, maxWidth: 560, lineHeight: 1.65 }}>

          </div>
          <div style={{ marginTop: 20, display: 'flex', gap: 20 }}>
            {categories.slice(1).map(c => {
              const cc = CAT_COLORS[c];
              const count = TRADING_RULES.filter(r => r.category === c).length;
              return (
                <div key={c} style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <div style={{ fontSize: 18, fontWeight: 700, fontFamily: "'DM Mono'" }}>{count}</div>
                  <div style={{ fontSize: 11, opacity: 0.6 }}>{c} rules</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Filter */}
      <div style={{ display: 'flex', gap: 8 }}>
        {categories.map(c => {
          const isAll = c === 'All';
          const cc = isAll ? null : CAT_COLORS[c];
          const sel = active === c;
          return (
            <button key={c} onClick={() => setActive(c)} style={{
              padding: '7px 18px',
              borderRadius: 99,
              border: `1px solid ${sel ? (isAll ? 'var(--navy)' : cc.border) : 'var(--border-strong)'}`,
              background: sel ? (isAll ? 'var(--navy)' : cc.bg) : 'white',
              color: sel ? (isAll ? 'white' : cc.color) : 'var(--text-secondary)',
              fontFamily: 'Space Grotesk',
              fontSize: 12,
              fontWeight: 600,
              cursor: 'pointer',
              transition: 'all 0.15s',
            }}>
              {!isAll && <span style={{ marginRight: 5 }}>{CAT_ICONS[c]}</span>}
              {c}
            </button>
          );
        })}
      </div>

      {/* Rules grid */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, paddingBottom: 24 }}>
        {filtered.map(rule => {
          const cc = CAT_COLORS[rule.category];
          return (
            <div key={rule.id} style={{
              background: 'white',
              borderRadius: 'var(--radius)',
              border: '1px solid var(--border)',
              padding: '22px 22px',
              boxShadow: 'var(--shadow-sm)',
              transition: 'all 0.2s',
              cursor: 'default',
              display: 'flex',
              flexDirection: 'column',
              gap: 14,
            }}
            onMouseEnter={e => { e.currentTarget.style.boxShadow = 'var(--shadow-md)'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
            onMouseLeave={e => { e.currentTarget.style.boxShadow = 'var(--shadow-sm)'; e.currentTarget.style.transform = 'translateY(0)'; }}
            >
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ width: 32, height: 32, borderRadius: 8, background: cc.bg, border: `1px solid ${cc.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, color: cc.color }}>
                    {CAT_ICONS[rule.category]}
                  </div>
                  <span className="pill" style={{ background: cc.bg, color: cc.color, border: `1px solid ${cc.border}`, fontSize: 10 }}>{rule.category}</span>
                </div>
                <div style={{ fontFamily: "'DM Mono'", fontSize: 10, color: 'var(--text-tertiary)', fontWeight: 500 }}>#{String(rule.id).padStart(2,'0')}</div>
              </div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--text-primary)', letterSpacing: '-0.01em', marginBottom: 8 }}>{rule.title}</div>
                <div style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.65 }}>{rule.body}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
